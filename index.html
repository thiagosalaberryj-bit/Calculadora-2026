<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora 2026</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">

        <div class="theme-toggle-container">
            <button id="theme-toggle" class="theme-toggle">🌙 Modo oscuro</button>
        </div>

        <main>
            <div class="calculator">
                <div class="display">
                    <div class="display-expression" id="display-expression"></div>
                    <input type="text" id="display" disabled placeholder="0" />
                </div>

                <div class="buttons">
                    <button class="btn" data-value="7">7</button>
                    <button class="btn" data-value="8">8</button>
                    <button class="btn" data-value="9">9</button>
                    <button class="btn operator" data-value="/">÷</button>

                    <button class="btn" data-value="4">4</button>
                    <button class="btn" data-value="5">5</button>
                    <button class="btn" data-value="6">6</button>
                    <button class="btn operator" data-value="*">×</button>

                    <button class="btn" data-value="1">1</button>
                    <button class="btn" data-value="2">2</button>
                    <button class="btn" data-value="3">3</button>
                    <button class="btn operator" data-value="-">−</button>

                    <button class="btn" data-value=".">.</button>
                    <button class="btn" data-value="0">0</button>
                    <button class="btn" id="clear" data-value="C">C</button>
                    <button class="btn operator" data-value="+">+</button>

                    <button class="btn equal" id="equals" data-value="=">=</button>
                </div>
            </div>

            <aside class="history-panel">
                <h3>ultimas 5 operaciones</h3>
                <ul id="history-list">
                    <li class="history-empty">sin operaciones</li>
                </ul>
            </aside>
        </main>

    </div>

    <script src="js/theme.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
